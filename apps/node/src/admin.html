<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSP Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --border-active: #444444;
    --text: #e8e8e8;
    --muted: #666666;
    --accent: #00ff88;
    --accent-dim: rgba(0,255,136,0.08);
    --danger: #ff4444;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 220px;
    border-right: 1px solid var(--border);
    padding: 32px 0;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .logo {
    padding: 0 24px 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .logo-mark {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .logo-sub {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
  }

  .nav { padding: 0 12px; flex: 1; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    font-weight: 400;
    transition: all 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover { color: var(--text); background: var(--surface); }
  .nav-item.active { color: var(--accent); background: var(--accent-dim); }

  .nav-item .icon { font-size: 14px; width: 16px; text-align: center; }

  .main {
    flex: 1;
    padding: 40px 48px;
    max-width: 900px;
  }

  /* ── Auth gate ── */
  .auth-gate {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--bg);
  }

  .auth-box {
    border: 1px solid var(--border);
    padding: 40px;
    width: 340px;
  }

  .auth-box h2 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .auth-box p { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

  /* ── Section header ── */
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── Forms ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-grid .full { grid-column: 1 / -1; }

  .field { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  input, textarea, select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--border-active);
  }

  textarea { resize: vertical; min-height: 80px; }

  select option { background: var(--surface); }

  /* ── Buttons ── */
  .btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 9px 20px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }

  .btn-primary:hover { background: #00e87a; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--border-active); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid transparent;
    padding: 6px 10px;
    font-size: 10px;
  }

  .btn-danger:hover { border-color: var(--danger); background: rgba(255,68,68,0.06); }

  /* ── Product table ── */
  .product-table { width: 100%; border-collapse: collapse; }

  .product-table th {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 0 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .product-table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }

  .product-table tr:last-child td { border-bottom: none; }
  .product-table tr:hover td { background: rgba(255,255,255,0.02); }

  .product-table .id-cell {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Tags ── */
  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 2px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .tag.free    { border-color: #1a4a2e; color: var(--accent); }
  .tag.paid    { border-color: #3a2a10; color: #f0a040; }
  .tag.pwyw    { border-color: #1a2a4a; color: #6090ff; }

  /* ── Toasts ── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 12px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
  }

  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { border-left-color: var(--danger); }

  /* ── Divider ── */
  .mt { margin-top: 24px; }
  .mt-sm { margin-top: 12px; }

  /* ── Empty state ── */
  .empty {
    padding: 48px 0;
    text-align: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    border: 1px dashed var(--border);
    border-radius: 4px;
  }

  /* ── Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-backdrop.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg);
    border: 1px solid var(--border);
    width: 540px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 32px;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .modal-title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .close-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 18px; line-height: 1;
  }

  .close-btn:hover { color: var(--text); }

  /* ── Status dot ── */
  .status-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent);
    margin-right: 8px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<!-- AUTH GATE -->
<div class="auth-gate" id="authGate">
  <div class="auth-box">
    <h2>OSP Node</h2>
    <p>Enter your admin password to continue.</p>
    <div class="field" style="margin-bottom:16px;">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autofocus>
    </div>
    <button class="btn btn-primary" onclick="login()" style="width:100%">Authenticate</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="layout" id="app" style="display:none;">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-mark">OSP Node</div>
      <div class="logo-sub"><span class="status-dot"></span>running</div>
    </div>
    <nav class="nav">
      <button class="nav-item active" onclick="showTab('shop', this)">
        <span class="icon">◈</span> Shop
      </button>
      <button class="nav-item" onclick="showTab('products', this)">
        <span class="icon">▦</span> Products
      </button>
      <button class="nav-item" onclick="showTab('endpoints', this)">
        <span class="icon">◎</span> Endpoints
      </button>
    </nav>
  </aside>

  <main class="main">

    <!-- TAB: SHOP -->
    <div id="tab-shop">
      <div class="section-header">
        <span class="section-title">Shop Settings</span>
        <button class="btn btn-primary" onclick="saveShop()">Save changes</button>
      </div>
      <div class="form-grid">
        <div class="field">
          <label>Shop name *</label>
          <input type="text" id="shop-name" placeholder="My Shop">
        </div>
        <div class="field">
          <label>Owner</label>
          <input type="text" id="shop-owner" placeholder="Your name">
        </div>
        <div class="field full">
          <label>Description</label>
          <textarea id="shop-description" placeholder="Short description of your shop…"></textarea>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="shop-email" placeholder="you@example.com">
        </div>
        <div class="field">
          <label>Logo URL</label>
          <input type="url" id="shop-logo" placeholder="https://…/logo.png">
        </div>
        <div class="field">
          <label>Language (BCP 47)</label>
          <input type="text" id="shop-lang" placeholder="en">
        </div>
        <div class="field">
          <label>Currency (ISO 4217)</label>
          <input type="text" id="shop-currency" placeholder="USD">
        </div>
        <div class="field full">
          <label>Categories (comma-separated)</label>
          <input type="text" id="shop-categories" placeholder="fonts, icons, templates">
        </div>
        <div class="field full">
          <label>Tags (comma-separated)</label>
          <input type="text" id="shop-tags" placeholder="indie, design, open-source">
        </div>
      </div>
    </div>

    <!-- TAB: PRODUCTS -->
    <div id="tab-products" style="display:none;">
      <div class="section-header">
        <span class="section-title">Products</span>
        <button class="btn btn-primary" onclick="openModal()">+ Add product</button>
      </div>
      <div id="products-list"></div>
    </div>

    <!-- TAB: ENDPOINTS -->
    <div id="tab-endpoints" style="display:none;">
      <div class="section-header">
        <span class="section-title">OSP Endpoints</span>
      </div>
      <div style="display:flex; flex-direction:column; gap:12px;" id="endpoint-list"></div>
    </div>

  </main>
</div>

<!-- ADD PRODUCT MODAL -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">New Product</span>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid">
      <div class="field full">
        <label>Name *</label>
        <input type="text" id="p-name" placeholder="My Product">
      </div>
      <div class="field full">
        <label>Description</label>
        <textarea id="p-description" placeholder="Short description…" style="min-height:60px;"></textarea>
      </div>
      <div class="field full">
        <label>Product URL *</label>
        <input type="url" id="p-url" placeholder="https://…/products/my-product">
      </div>
      <div class="field">
        <label>Type</label>
        <select id="p-type">
          <option value="download">Download</option>
          <option value="subscription">Subscription</option>
          <option value="tool">Tool</option>
          <option value="content">Content</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="field">
        <label>Price model</label>
        <select id="p-price-model" onchange="togglePriceFields()">
          <option value="free">Free</option>
          <option value="fixed">Fixed</option>
          <option value="pay_what_you_want">Pay what you want</option>
          <option value="subscription">Subscription</option>
        </select>
      </div>
      <div class="field" id="p-amount-field" style="display:none;">
        <label>Amount (minor units)</label>
        <input type="number" id="p-amount" placeholder="1200 = $12.00" min="0">
      </div>
      <div class="field" id="p-currency-field" style="display:none;">
        <label>Currency</label>
        <input type="text" id="p-currency" placeholder="USD">
      </div>
      <div class="field full">
        <label>Cover URL</label>
        <input type="url" id="p-cover" placeholder="https://…/cover.png">
      </div>
      <div class="field">
        <label>Version</label>
        <input type="text" id="p-version" placeholder="1.0.0">
      </div>
      <div class="field">
        <label>License (SPDX)</label>
        <input type="text" id="p-license" placeholder="MIT">
      </div>
      <div class="field full">
        <label>Tags (comma-separated)</label>
        <input type="text" id="p-tags" placeholder="design, tools">
      </div>
    </div>
    <div class="mt" style="display:flex; gap:12px; justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createProduct()">Create product</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const BASE = '';
let PASSWORD = '';

// ── Auth ──────────────────────────────────────────────────────────────────────

function login() {
  const pw = document.getElementById('passwordInput').value;
  if (!pw) return;
  PASSWORD = pw;
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadShop();
  loadProducts();
  renderEndpoints();
}

document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

// ── Toast ─────────────────────────────────────────────────────────────────────

function toast(msg, error = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (error ? ' error' : '');
  setTimeout(() => el.className = '', 2500);
}

// ── Tabs ──────────────────────────────────────────────────────────────────────

function showTab(name, btn) {
  ['shop', 'products', 'endpoints'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (name === 'products') loadProducts();
}

// ── Shop ──────────────────────────────────────────────────────────────────────

async function loadShop() {
  try {
    const res = await fetch(`${BASE}/admin/shop`, {
      headers: { 'x-admin-password': PASSWORD }
    });
    if (!res.ok) { toast('Auth failed', true); return; }
    const d = await res.json();
    document.getElementById('shop-name').value        = d.name || '';
    document.getElementById('shop-owner').value       = d.owner || '';
    document.getElementById('shop-description').value = d.description || '';
    document.getElementById('shop-email').value       = d.email || '';
    document.getElementById('shop-logo').value        = d.logo_url || '';
    document.getElementById('shop-lang').value        = d.lang || 'en';
    document.getElementById('shop-currency').value    = d.currency || 'USD';
    document.getElementById('shop-categories').value  = (d.categories || []).join(', ');
    document.getElementById('shop-tags').value        = (d.tags || []).join(', ');
  } catch(e) { toast('Could not load shop', true); }
}

async function saveShop() {
  const splitTrim = v => v.split(',').map(s => s.trim()).filter(Boolean);
  const body = {
    name:        document.getElementById('shop-name').value || undefined,
    owner:       document.getElementById('shop-owner').value || undefined,
    description: document.getElementById('shop-description').value || undefined,
    email:       document.getElementById('shop-email').value || undefined,
    logo_url:    document.getElementById('shop-logo').value || undefined,
    lang:        document.getElementById('shop-lang').value || undefined,
    currency:    document.getElementById('shop-currency').value || undefined,
    categories:  splitTrim(document.getElementById('shop-categories').value),
    tags:        splitTrim(document.getElementById('shop-tags').value),
  };
  try {
    const res = await fetch(`${BASE}/admin/shop`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': PASSWORD },
      body: JSON.stringify(body),
    });
    if (res.ok) toast('Shop saved ✓');
    else toast('Save failed', true);
  } catch(e) { toast('Error', true); }
}

// ── Products ──────────────────────────────────────────────────────────────────

async function loadProducts() {
  try {
    const res = await fetch(`${BASE}/admin/products`, {
      headers: { 'x-admin-password': PASSWORD }
    });
    const d = await res.json();
    renderProducts(d.products || []);
  } catch(e) { toast('Could not load products', true); }
}

function renderProducts(products) {
  const el = document.getElementById('products-list');
  if (!products.length) {
    el.innerHTML = '<div class="empty">No products yet — add your first one above.</div>';
    return;
  }
  const rows = products.map(p => {
    const tagClass = p.price_model === 'free' ? 'free' : p.price_model === 'pay_what_you_want' ? 'pwyw' : 'paid';
    const price = p.price_model === 'free' ? 'Free'
      : p.price_model === 'pay_what_you_want' ? 'PWYW'
      : p.price_amount ? `${(p.price_amount/100).toFixed(2)} ${p.price_currency || ''}` : p.price_model;
    return `<tr>
      <td class="id-cell">${p.id}</td>
      <td>${p.name}</td>
      <td><span class="tag">${p.product_type}</span></td>
      <td><span class="tag ${tagClass}">${price}</span></td>
      <td>${p.version || '—'}</td>
      <td><button class="btn btn-danger" onclick="deleteProduct('${p.id}')">Delete</button></td>
    </tr>`;
  }).join('');

  el.innerHTML = `<table class="product-table">
    <thead><tr>
      <th>ID</th><th>Name</th><th>Type</th><th>Price</th><th>Version</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

async function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  try {
    const res = await fetch(`${BASE}/admin/products/${id}`, {
      method: 'DELETE',
      headers: { 'x-admin-password': PASSWORD }
    });
    if (res.ok) { toast('Product deleted'); loadProducts(); }
    else toast('Delete failed', true);
  } catch(e) { toast('Error', true); }
}

async function createProduct() {
  const splitTrim = v => v.split(',').map(s => s.trim()).filter(Boolean);
  const model = document.getElementById('p-price-model').value;
  const amount = document.getElementById('p-amount').value;

  const body = {
    name:         document.getElementById('p-name').value,
    description:  document.getElementById('p-description').value || undefined,
    url:          document.getElementById('p-url').value,
    product_type: document.getElementById('p-type').value,
    price_model:  model,
    price_amount: amount ? parseInt(amount) : undefined,
    price_currency: document.getElementById('p-currency').value || undefined,
    cover_url:    document.getElementById('p-cover').value || undefined,
    version:      document.getElementById('p-version').value || undefined,
    license_spdx: document.getElementById('p-license').value || undefined,
    tags:         splitTrim(document.getElementById('p-tags').value),
  };

  if (!body.name || !body.url) { toast('Name and URL are required', true); return; }

  try {
    const res = await fetch(`${BASE}/admin/products`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': PASSWORD },
      body: JSON.stringify(body),
    });
    if (res.ok) {
      toast('Product created ✓');
      closeModal();
      loadProducts();
    } else {
      const err = await res.json();
      toast(err.error || 'Failed', true);
    }
  } catch(e) { toast('Error', true); }
}

function togglePriceFields() {
  const model = document.getElementById('p-price-model').value;
  const needsAmount = model === 'fixed' || model === 'subscription';
  document.getElementById('p-amount-field').style.display = needsAmount ? '' : 'none';
  document.getElementById('p-currency-field').style.display = needsAmount ? '' : 'none';
}

// ── Modal ─────────────────────────────────────────────────────────────────────

function openModal() {
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ── Endpoints ─────────────────────────────────────────────────────────────────

function renderEndpoints() {
  const origin = window.location.origin;
  const endpoints = [
    { path: '/.well-known/osp', desc: 'Discovery entry point — crawlers start here' },
    { path: '/shop.json',       desc: 'Shop manifest — identity, links, metadata' },
    { path: '/products.json',   desc: 'Product listing — all published products' },
  ];

  document.getElementById('endpoint-list').innerHTML = endpoints.map(e => `
    <div style="border:1px solid var(--border); padding:16px 20px; border-radius:3px; display:flex; align-items:center; justify-content:space-between; gap:16px;">
      <div>
        <div style="font-family:var(--mono); font-size:13px; margin-bottom:4px;">${origin}${e.path}</div>
        <div style="font-size:12px; color:var(--muted);">${e.desc}</div>
      </div>
      <a href="${e.path}" target="_blank" style="color:var(--accent); font-family:var(--mono); font-size:11px; text-decoration:none; white-space:nowrap; flex-shrink:0;">Open ↗</a>
    </div>
  `).join('');
}
</script>
</body>
</html>
